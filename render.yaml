services:
  - type: web
    name: avra-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: avra-db
          property: connectionString

databases:
  - name: avra-db
    plan: free
    region: oregon
